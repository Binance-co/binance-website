<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            padding: 50px 40px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            color: #f3ba2f;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .tagline {
            color: #999;
            font-size: 13px;
            letter-spacing: 1px;
        }

        h1 {
            color: #111;
            font-size: 26px;
            margin-top: 30px;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #f3ba2f;
            box-shadow: 0 0 0 3px rgba(243, 186, 47, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #f3ba2f;
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #e0a91f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 186, 47, 0.3);
        }

        .forgot-password {
            text-align: center;
            margin-top: 15px;
        }

        .forgot-password a {
            color: #f3ba2f;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .signup-link a {
            color: #f3ba2f;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">₿ BINANCE</div>
            <div class="tagline">THE WORLD'S LEADING CRYPTO EXCHANGE</div>
        </div>

        <h1>Login to Your Account</h1>

        <div id="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username or Email *</label>
                <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="forgot-password">
            <a href="#">Forgot your password?</a>
        </div>

        <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign up here</a> | 
            <a href="admin.html">Admin Dashboard</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const signups = JSON.parse(localStorage.getItem('signups')) || [];
            const user = signups.find(s => 
                (s.username === username || s.email === username) && s.password === password
            );

            const messageDiv = document.getElementById('message');

            if (user) {
                messageDiv.className = 'message';
                messageDiv.style.background = '#d4edda';
                messageDiv.style.color = '#155724';
                messageDiv.textContent = '✅ Login successful!';
                document.getElementById('loginForm').reset();
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1500);
            } else {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Invalid username or password!';
            }
        });
    </script>
</body>
</html>
