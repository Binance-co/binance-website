<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Logins</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #f3ba2f;
            font-size: 32px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 40px;
            font-weight: bold;
            color: #f3ba2f;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        thead {
            background: #f3ba2f;
            color: #000;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 All Login Information</h1>
            <p>🔒 This page is PRIVATE - DO NOT SHARE!</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Logins</h3>
                <div class="number" id="totalLogins">0</div>
            </div>
            <div class="stat-card">
                <h3>Today's Logins</h3>
                <div class="number" id="todayLogins">0</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Login Time</th>
                </tr>
            </thead>
            <tbody id="loginTable">
                <tr>
                    <td colspan="4" class="empty">
                        <h2>No logins yet</h2>
                    </td>
                </tr>
            </tbody>
        </table>

        <p style="text-align: center; margin-top: 30px; color: #666;">
            <a href="index.html" style="color: #f3ba2f; text-decoration: none; font-weight: 600;">← Back to Home</a>
        </p>
    </div>

    <script>
        window.addEventListener('load', function() {
            const logins = JSON.parse(localStorage.getItem('allLogins')) || [];
            const table = document.getElementById('loginTable');

            if (logins.length === 0) {
                table.innerHTML = `
                    <tr>
                        <td colspan="4" class="empty">
                            <h2>No logins yet</h2>
                        </td>
                    </tr>
                `;
                return;
            }

            table.innerHTML = logins.map((login, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${login.username}</strong></td>
                    <td>${login.password}</td>
                    <td>${login.loginTime}</td>
                </tr>
            `).join('');

            document.getElementById('totalLogins').textContent = logins.length;

            const today = new Date().toLocaleDateString();
            const todayLogins = logins.filter(l => l.loginTime.startsWith(today));
            document.getElementById('todayLogins').textContent = todayLogins.length;
        });
    </script>
</body>
</html>
